name: Keep Supabase Active

on:
  schedule:
    # Runs at 09:00 UTC every Monday and Thursday
    - cron: '0 9 * * 1,4'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth Health
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 1. Fallback to direct URL if secret is missing or empty
          TARGET_URL="${SUPABASE_URL:-https://jmnuruiejlxflhvvybdh.supabase.co}"
          
          # Remove any potential whitespace or hidden characters
          CLEAN_URL=$(echo "$TARGET_URL" | tr -d '[:space:]')
          ENDPOINT="${CLEAN_URL}/auth/v1/health"

          echo "Pinging endpoint: $ENDPOINT"

          # 2. Perform health check request
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$ENDPOINT" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "Received HTTP Status Code: $HTTP_STATUS"

          # 3. Supabase health check returns 200 OK when online
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 204 ]; then
            echo "✅ Supabase project is active and healthy!"
            exit 0
          else
            echo "⚠️ Health endpoint responded with code $HTTP_STATUS"
            # Return 0 so it registers activity on Supabase regardless of key permissions
            exit 0
          fi
