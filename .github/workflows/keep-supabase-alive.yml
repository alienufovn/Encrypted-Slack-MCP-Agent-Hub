name: Keep Supabase Active

on:
  schedule:
    # Runs at 09:00 UTC every Monday and Thursday
    - cron: '0 9 * * 1,4'
  workflow_dispatch: # Allows manual trigger anytime from Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database & Auth Service
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Fallback target if secret is unreadable
          PROJECT_URL="${SUPABASE_URL:-https://jmnuruiejlxflhvvybdh.supabase.co}"
          
          # Clean whitespace
          CLEAN_URL=$(echo "$PROJECT_URL" | tr -d '[:space:]' | sed 's/*$//')

          echo "Targeting Supabase Project: $CLEAN_URL"

          # 1. Ping Auth Service
          echo "Checking Auth Health..."
          AUTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${CLEAN_URL}/auth/v1/health" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "Auth Response Status: $AUTH_STATUS"

          # 2. Touch Database REST Engine (Resets the 7-day database inactivity timer)
          echo "Pinging Database Engine..."
          DB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${CLEAN_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "Database Response Status: $DB_STATUS"

          # Evaluate success
          if [ "$AUTH_STATUS" -eq 200 ] || [ "$DB_STATUS" -eq 200 ]; then
            echo "✅ Activity logged successfully! Database timer reset."
            exit 0
          else
            echo "⚠️ Non-200 responses received, but HTTP traffic was logged."
            exit 0
          fi
