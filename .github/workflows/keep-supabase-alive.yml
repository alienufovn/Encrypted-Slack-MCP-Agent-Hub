name: Keep Supabase Active

on:
  schedule:
    # Runs at 09:00 UTC every Monday and Thursday
    - cron: '0 9 * * 1,4'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth Health
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Ensure URL is trimmed and not empty
          URL=$(echo "$SUPABASE_URL" | tr -d '[:space:]' | sed 's/*$//')
          
          if [ -z "$URL" ]; then
            echo "❌ Error: SUPABASE_URL secret is empty or missing!"
            exit 1
          fi

          echo "Targeting endpoint: ${URL}/auth/v1/health"

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${URL}/auth/v1/health" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "HTTP Status Code: $RESPONSE"

          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 204 ]; then
            echo "✅ Supabase ping successful!"
            exit 0
          else
            echo "❌ Ping failed with status code $RESPONSE"
            exit 1
          fi
